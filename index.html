<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LucideCore - Coming Soon</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      background: #f5f5f7;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      /* justify-content: center; */
      align-items: center;
    }

    /* Background Glow */
    body::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(122, 70, 255, 0.18) 0%, transparent 70%);
      top: -150px;
      right: -150px;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(52, 94, 255, 0.12) 0%, transparent 70%);
      bottom: -180px;
      left: -120px;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 850px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* Top Logo */
    .logo-box {
      width: 260px;
      margin: 0 auto 10px;
      background: #fff;
      border-radius: 0 0 35px 35px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .logo-box img {
      width: 65%;
      object-fit: contain;
    }

    /* Emoji */
    .emoji {
      font-size: 40px;
      margin-bottom: 25px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .mini-title {
      color: #555;
      letter-spacing: 4px;
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: 500;
    }

    h1 {
      font-size: 65px;
      line-height: 1.1;
      font-weight: 800;
      color: #1e40ff;
      margin-bottom: 25px;
    }

    h1 span {
      color: #7a46ff;
    }

    .desc {
      font-size: 18px;
      color: #666;
      line-height: 1.8;
      max-width: 700px;
      margin: auto;
    }

    /* Notify Button */
    .notify-btn {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-top: 50px;
      background: #12163d;
      color: #fff;
      text-decoration: none;
      padding: 14px 34px 14px 16px;
      border-radius: 70px;
      font-size: 20px;
      font-weight: 500;
      transition: 0.3s ease;
      box-shadow: 0 15px 35px rgba(18, 22, 61, 0.25);
    }

    .notify-btn:hover {
      transform: translateY(-4px);
    }

    .notify-btn .icon {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e40ff;
      font-size: 22px;
    }

    /* Social Icons */
    .socials {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .socials a {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #555;
      font-size: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transition: 0.3s;
    }

    .socials a:hover {
      transform: translateY(-5px);
      color: #7a46ff;
    }

    /* Decorative Shapes */
    .shape {
      position: absolute;
      z-index: 1;
      opacity: 0.8;
      animation: rotate 8s linear infinite;
    }

    .shape1 {
      left: 80px;
      bottom: 120px;
      width: 70px;
      height: 70px;
      border: 12px solid #8fd19e;
      border-top-color: transparent;
      border-radius: 50%;
    }

    .shape2 {
      right: 100px;
      bottom: 140px;
      width: 60px;
      height: 18px;
      background: #f7b548;
      border-radius: 20px;
      transform: rotate(45deg);
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media(max-width:768px) {

      body {
        overflow: hidden;
      }

      .logo-box {
        width: 180px;
        margin-bottom: 20px;
      }

      .emoji {
        margin-bottom: 15px;
        font-size: 32px;
      }

      .mini-title {
        margin-bottom: 10px;
        font-size: 12px;
      }

      h1 {
        font-size: 38px;
        margin-bottom: 15px;
      }

      .desc {
        font-size: 15px;
        line-height: 1.6;
        padding: 0 15px;
      }

      .socials {
        margin-top: 35px;
      }

      .shape1,
      .shape2 {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Decorative Shapes -->
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>

  <div class="container">

    <!-- Logo -->
    <div class="logo-box">
      <img src="logo.png" alt="LucideCore Logo">
    </div>

    <!-- Content -->
    <div class="emoji">🚀</div>

    <div class="mini-title">
      WE’RE STILL BUILDING
    </div>

    <h1>
      Launching Something <span>Powerful.</span>
    </h1>

    <p class="desc">
      Our new digital experience is currently under development.
      We’re crafting a modern platform packed with innovation,
      creativity, and powerful IT solutions for your business.
    </p>
    <!-- Social Icons -->
    <div class="socials">

      <a href="https://www.instagram.com/lucide.core/">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="https://www.linkedin.com/company/lucidecore/">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

    </div>

  </div>

</body>

</html>
