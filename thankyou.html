<!DOCTYPE html>
<html lang="en-US" class="rs-smoother-yes">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="profile" href="//gmpg.org/xfn/11">
	<title>Thank You | LucideCore</title>
	<meta name="description" content="Thank you for contacting LucideCore. We have received your inquiry and will get back to you shortly.">
	<meta name='robots' content='noindex, nofollow' />
	<link rel='dns-prefetch' href='//fonts.googleapis.com' />
	
	<!-- Stylesheets -->
	<link rel='stylesheet' id='boostrap-css' href='css/bootstrap.min.css' type='text/css' media='all' />
	<link rel='stylesheet' id='remixicon-css' href='css/remixicon.css' type='text/css' media='all' />
	<link rel='stylesheet' id='lucidecore-style-default-css' href='css/default.css' type='text/css' media='all' />
	<link rel='stylesheet' id='lucidecore-style-responsive-css' href='css/responsive.css' type='text/css' media='all' />
	<link rel='stylesheet' id='lucidecore-style-css' href='css/style.css' type='text/css' media='all' />
	<link rel='stylesheet' id='lucidecore-google-fonts-css'
		href='https://fonts.googleapis.com/css?family=Golos%20Text:400,500,600,700,800,900|Cal%20Sans:400,500,600,700,800,900&#038;display=swap'
		type='text/css' media='all' />
	<link rel='stylesheet' id='elementor-frontend-css' href='css/custom-frontend.min.css' type='text/css' media='all' />
	<link rel='stylesheet' id='base-desktop-css' href='css/base-desktop.css' type='text/css' media='all' />
	<link rel='stylesheet' id='rstb-frontend-css' href='css/rstb-frontend.min.css' type='text/css' media='all' />
	<link rel='stylesheet' id='rs-swiper-css' href='css/rs-custom-swiper.min.css' type='text/css' media='all' />
	<link rel="stylesheet" href="css/branding-redesign.css" type="text/css" media="all" />

	<!-- Favicon Setup -->
	<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-96x96.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-96x96.png">
	<link rel="manifest" href="favicon/site.webmanifest">
	<link rel="mask-icon" href="favicon/favicon.svg" color="#5bbad5">
	<link rel="shortcut icon" href="favicon/favicon.ico">

	<style>
		:root {
			--bodyColor: #616161;
			--primaryColor: #1053f3;
			--primaryColorRGB: 16, 83, 243;
			--primaryForegroundColor: #ffffff;
			--secondaryColor: #061153;
			--titleColor: #061153;
			--shadeColor: #f6f8ff;
			--borderColor: #e3e3e8;
		}

		.thankyou-wrapper {
			padding: 100px 0;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 60vh;
			background: linear-gradient(135deg, #f6f8ff 0%, #ffffff 100%);
		}

		.thankyou-card {
			background: #ffffff;
			border-radius: 24px;
			box-shadow: 0 20px 40px rgba(16, 83, 243, 0.05);
			border: 1px solid rgba(16, 83, 243, 0.08);
			padding: 60px 40px;
			text-align: center;
			max-width: 600px;
			width: 100%;
			position: relative;
			overflow: hidden;
		}

		/* Decorative dynamic gradient elements */
		.thankyou-card::before {
			content: '';
			position: absolute;
			top: -50%;
			left: -50%;
			width: 200%;
			height: 200%;
			background: radial-gradient(circle, rgba(16, 83, 243, 0.03) 0%, transparent 70%);
			z-index: 1;
			pointer-events: none;
		}

		.success-icon-container {
			width: 100px;
			height: 100px;
			background: rgba(16, 83, 243, 0.08);
			border-radius: 50%;
			display: inline-flex;
			justify-content: center;
			align-items: center;
			margin-bottom: 30px;
			position: relative;
			z-index: 2;
			animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
		}

		.success-icon {
			font-size: 50px;
			color: #1053f3;
			line-height: 1;
			animation: checkmarkPulse 2s infinite ease-in-out;
		}

		.thankyou-card h2 {
			font-family: 'Cal Sans', sans-serif;
			font-size: 42px;
			color: #061153;
			margin-bottom: 16px;
			font-weight: 700;
			position: relative;
			z-index: 2;
		}

		.thankyou-card p {
			font-family: 'Golos Text', sans-serif;
			font-size: 16px;
			color: #616161;
			line-height: 1.6;
			margin-bottom: 40px;
			position: relative;
			z-index: 2;
		}

		.thankyou-action-btn {
			display: inline-block;
			background: #1053f3;
			color: #ffffff;
			font-family: 'Golos Text', sans-serif;
			font-weight: 600;
			font-size: 16px;
			padding: 16px 40px;
			border-radius: 50px;
			text-decoration: none;
			transition: all 0.3s ease;
			box-shadow: 0 10px 20px rgba(16, 83, 243, 0.15);
			position: relative;
			z-index: 2;
		}

		.thankyou-action-btn:hover {
			background: #061153;
			color: #ffffff;
			transform: translateY(-3px);
			box-shadow: 0 15px 25px rgba(6, 17, 83, 0.2);
		}

		@keyframes scaleIn {
			0% {
				transform: scale(0);
				opacity: 0;
			}
			100% {
				transform: scale(1);
				opacity: 1;
			}
		}

		@keyframes checkmarkPulse {
			0%, 100% {
				transform: scale(1);
			}
			50% {
				transform: scale(1.1);
			}
		}

		@media (max-width: 576px) {
			.thankyou-card {
				padding: 40px 20px;
				margin: 0 15px;
			}
			.thankyou-card h2 {
				font-size: 32px;
			}
		}
	</style>
	<script src="js/components.js" defer></script>
</head>

<body class="wp-singular page-template page-template-elementor_header_footer page wp-theme-lucidecore gsap-enable rs-smoother-yes elementor-default elementor-template-full-width elementor-kit-5256">

	<!-- Preloader -->
	<div id="pre-load">
		<button class="cancel-loader" type="button">Cancel Loader</button>
		<div id="loader" class="loader">
			<div class="loader-container">
				<div class='loader-icon'><img src="images/logo-only-4k-without-bgpng.png" alt="LucideCore Logo"></div>
			</div>
		</div>
	</div>

	<div id="page" class="site">
		<!-- Dynamic Header Injection -->
		<header class="rstb-header"></header>

		<div class="main-contain offcontents">
			<div class="thankyou-wrapper">
				<div class="thankyou-card">
					<div class="success-icon-container">
						<i class="ri-checkbox-circle-fill success-icon"></i>
					</div>
					<h2>Thank You!</h2>
					<p>Your message has been sent successfully. We appreciate you reaching out to LucideCore and our team will get back to you shortly.</p>
					<a href="index.html" class="thankyou-action-btn">Back to Home</a>
				</div>
			</div>
		</div>

		<!-- Dynamic Footer Injection is automatically handled via components.js -->
		<footer class="rstb-footer"></footer>
	</div>

	<!-- Core scripts -->
	<script type="text/javascript" src="js/jquery.min.js"></script>
	<script type="text/javascript" src="js/popper.min.js"></script>
	<script type="text/javascript" src="js/bootstrap.min.js"></script>
	<script type="text/javascript" src="js/lenis.min.js"></script>
	<script type="text/javascript" src="js/main.js"></script>
</body>

</html>
